name: Deploy

# CI on every push/PR; deploy to the prod VM only on push to main, and only
# once the box is wired up (set repo variable DEPLOY_ENABLED=true + the secrets
# listed below). Until then the deploy job is skipped, so merging is always safe.
#
# The prod box has only 2GB RAM and OOM-kills `next build`, which also corrupts
# the live .next mid-build. So the build runs HERE (on the runner, plenty of
# RAM); the box only receives the finished .next and restarts. Nothing is built
# on the box.
#
# Required to enable deploys (Settings → Secrets and variables → Actions):
#   Variable  DEPLOY_ENABLED     = true
#   Secret    DEPLOY_HOST        = 51.250.11.225
#   Secret    DEPLOY_USER        = artsaverin
#   Secret    DEPLOY_SSH_KEY     = <private key whose public half is in the box's authorized_keys>
#   Secret    DEPLOY_KNOWN_HOSTS = <output of: ssh-keyscan -t ed25519 51.250.11.225>

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  # Run JS-based actions on Node 24 (silences the Node 20 deprecation warning).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run lint
      - name: Build (.next) on the runner, not the prod box
        run: npm run build
        env:
          # Build never connects to the DB (all pages are force-dynamic), but a
          # valid-looking URL keeps PrismaClient construction at import happy.
          DATABASE_URL: "file:./ci.db"
      - name: Package the build for the box
        run: tar -czf next-build.tgz --exclude='.next/cache' .next
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.tgz
          retention-days: 2

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: next-build
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
      - name: Upload the prebuilt .next to the box
        run: |
          scp -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            next-build.tgz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/badcomment/next-build.tgz"
      - name: Swap in the build and restart (no build on the box)
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'cd /opt/badcomment && bash deploy/deploy.sh'
